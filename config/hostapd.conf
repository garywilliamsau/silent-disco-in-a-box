# WiFi Access Point configuration for Silent Disco
interface=wlan0
driver=nl80211
ssid=SilentDisco
ignore_broadcast_ssid=0
country_code=AU
hw_mode=g
channel=6
ieee80211n=1
ht_capab=[SHORT-GI-20]
wmm_enabled=1
max_num_sta=75
auth_algs=1
wpa=2
wpa_passphrase=letsdance
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
rsn_pairwise=CCMP
macaddr_acl=0
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2
