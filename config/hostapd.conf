# WiFi Access Point configuration for Silent Disco
# USB WiFi adapter (RTL8822BU) on 5GHz AC
interface=wlan1
driver=nl80211
ssid=SilentDisco
ignore_broadcast_ssid=0
country_code=AU
hw_mode=a
channel=36
ieee80211n=1
ieee80211ac=1
ht_capab=[HT40+][SHORT-GI-20][SHORT-GI-40][LDPC]
vht_capab=[SHORT-GI-80][TX-STBC-2BY1][RXLDPC][MAX-MPDU-11454][SU-BEAMFORMEE][MU-BEAMFORMEE]
vht_oper_chwidth=1
vht_oper_centr_freq_seg0_idx=42
wmm_enabled=1
max_num_sta=75
auth_algs=1
wpa=2
wpa_passphrase=letsdance
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
rsn_pairwise=CCMP
macaddr_acl=0
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2
