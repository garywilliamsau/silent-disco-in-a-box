upstream icecast {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream api {
    server 127.0.0.1:3000;
    keepalive 16;
}

# Shared config for both HTTP and HTTPS
map $uri $captive_portal {
    default 0;
    /hotspot-detect.html 1;
    /library/test/success.html 1;
    /generate_204 1;
    /gen_204 1;
    /ncsi.txt 1;
    /connecttest.txt 1;
    /success.txt 1;
}

# HTTP
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/disco;
    index index.html;

    # --- Captive Portal Detection ---

    location = /hotspot-detect.html {
        add_header Content-Type "text/html";
        return 200 '<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>';
    }

    location = /library/test/success.html {
        add_header Content-Type "text/html";
        return 200 '<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>';
    }

    location = /generate_204 {
        return 302 http://192.168.4.1/;
    }

    location = /gen_204 {
        return 302 http://192.168.4.1/;
    }

    location = /ncsi.txt {
        add_header Content-Type "text/plain";
        return 200 'Microsoft NCSI';
    }

    location = /connecttest.txt {
        add_header Content-Type "text/plain";
        return 200 'Microsoft Connect Test';
    }

    location = /success.txt {
        add_header Content-Type "text/plain";
        return 200 'success';
    }

    # --- Icecast Stream Proxy ---

    location /stream/ {
        rewrite ^/stream/(.*)$ /$1 break;

        proxy_pass http://icecast;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';

        proxy_max_temp_file_size 0;
    }

    # --- Node.js API Proxy ---

    location /api/ {
        client_max_body_size 200m;

        proxy_pass http://api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # --- Static Files ---

    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    access_log /var/log/nginx/disco_access.log;
    error_log /var/log/nginx/disco_error.log warn;
}

# HTTPS — same site, but mic access works here
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate /etc/nginx/ssl/disco.crt;
    ssl_certificate_key /etc/nginx/ssl/disco.key;

    root /var/www/disco;
    index index.html;

    location /stream/ {
        rewrite ^/stream/(.*)$ /$1 break;

        proxy_pass http://icecast;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';

        proxy_max_temp_file_size 0;
    }

    location /api/ {
        client_max_body_size 200m;

        proxy_pass http://api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    access_log /var/log/nginx/disco_access.log;
    error_log /var/log/nginx/disco_error.log warn;
}
