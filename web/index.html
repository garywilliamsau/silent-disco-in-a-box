<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>Silent Disco</title>
  <link rel="stylesheet" href="/css/main.css?v=5">
</head>
<body>

  <!-- Start Screen - "tap to enter" -->
  <div id="startScreen" class="screen active">
    <div class="start-content">
      <div class="logo-pulse"></div>
      <h1 id="eventName">Silent Disco</h1>
      <p id="eventTagline">Put on your headphones and pick a channel</p>
      <button id="startBtn" class="btn-start">Join the Disco</button>
    </div>
    <canvas id="bgCanvas" class="bg-canvas"></canvas>
  </div>

  <!-- Channel Select Screen -->
  <div id="channelScreen" class="screen">
    <h2 class="screen-title">Choose Your Channel</h2>
    <div id="channelCards" class="channel-cards"></div>
  </div>

  <!-- Player Screen -->
  <div id="playerScreen" class="screen">
    <div id="streamToast" class="stream-toast"></div>
    <canvas id="visualizer" class="visualizer"></canvas>
    <span id="channelName" style="display:none"></span>
    <div class="player-bar" style="margin-top:auto">
      <div class="track-info">
        <div id="trackTitle" class="track-title">Loading...</div>
        <div id="trackArtist" class="track-artist"></div>
      </div>
      <div id="listenerCount" class="listener-count"></div>
      <div class="channel-dots" id="channelDots"></div>
    </div>
    <audio id="audioPlayer" preload="none"></audio>

    <!-- Admin overlay (visible only with ?admin=1) -->
    <div id="adminOverlay" class="admin-overlay hidden">
      <div class="admin-overlay-bar">
        <div class="admin-overlay-stats">
          <span id="adminTotalListeners" class="admin-stat-total">0 listeners</span>
          <span class="admin-stat-ch" style="--dot-color:#ff1744">R:<span id="adminCountRed">0</span></span>
          <span class="admin-stat-ch" style="--dot-color:#00e676">G:<span id="adminCountGreen">0</span></span>
          <span class="admin-stat-ch" style="--dot-color:#2979ff">B:<span id="adminCountBlue">0</span></span>
        </div>
        <button id="adminSkipBtn" class="admin-skip-btn hidden" onclick="App.adminSkip()">Skip</button>
      </div>
    </div>

    <!-- Admin login prompt -->
    <div id="adminLoginPrompt" class="admin-login-prompt hidden">
      <div class="admin-login-box">
        <p>Admin access</p>
        <input type="password" id="adminPasswordInput" placeholder="Password" autocomplete="off">
        <button id="adminLoginBtn" onclick="App.adminLogin()">OK</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js?v=7"></script>
  <script src="/js/audio.js?v=9"></script>
  <script src="/js/visualizer.js?v=9"></script>
  <script src="/js/mediasession.js?v=3"></script>
  <script src="/js/app.js?v=15"></script>
</body>
</html>
