<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>Silent Disco</title>
  <link rel="stylesheet" href="/css/main.css?v=2">
</head>
<body>

  <!-- Start Screen - "tap to enter" -->
  <div id="startScreen" class="screen active">
    <div class="start-content">
      <div class="logo-pulse"></div>
      <h1 id="eventName">Silent Disco</h1>
      <p id="eventTagline">Put on your headphones and pick a channel</p>
      <button id="startBtn" class="btn-start">Join the Disco</button>
    </div>
    <canvas id="bgCanvas" class="bg-canvas"></canvas>
  </div>

  <!-- Channel Select Screen -->
  <div id="channelScreen" class="screen">
    <h2 class="screen-title">Choose Your Channel</h2>
    <div id="channelCards" class="channel-cards"></div>
  </div>

  <!-- Player Screen -->
  <div id="playerScreen" class="screen">
    <canvas id="visualizer" class="visualizer"></canvas>
    <div id="channelName" class="channel-label"></div>
    <div class="player-bar">
      <div class="track-info">
        <div id="trackTitle" class="track-title">Loading...</div>
        <div id="trackArtist" class="track-artist"></div>
      </div>
      <div id="listenerCount" class="listener-count"></div>
      <div class="channel-dots" id="channelDots"></div>
      <div class="talk-row">
        <button id="listenerTalkBtn" class="talk-dot"
          onmousedown="Talkover.start()" onmouseup="Talkover.stop()"
          ontouchstart="event.preventDefault(); Talkover.start()" ontouchend="Talkover.stop()">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </button>
      </div>
    </div>
    <audio id="audioPlayer" preload="none"></audio>
  </div>

  <script src="/js/api.js?v=3"></script>
  <script src="/js/talkover.js?v=1"></script>
  <script src="/js/audio.js?v=2"></script>
  <script src="/js/visualizer.js?v=3"></script>
  <script src="/js/mediasession.js?v=3"></script>
  <script src="/js/app.js?v=3"></script>
</body>
</html>
